version: '3.8'

services:
  nginx-proxy:
    image: nginx:latest
    container_name: global-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Falls du SSL/Let's Encrypt einrichtest, kannst du die Zertifikate hier mounten:
      # - ./certbot/conf:/etc/letsencrypt
      # - ./certbot/www:/var/www/certbot
    network_mode: host # Lässt Nginx direkt auf localhost des Servers zugreifen
