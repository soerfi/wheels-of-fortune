# Standard-Block für Anfragen direkt über die IP (http://72.62.43.134)
# Zeigt ab jetzt wieder dein Menü an!
server {
    listen 80 default_server;
    server_name _;

    location / {
        # Hier leiten wir auf Port 8000 um, wo dein Menü laufen sollte
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Block für win.skate.ch (Wheel of Fortune)
server {
    listen 80;
    server_name win.skate.ch;

    # Auskommentieren, wenn SSL Zertifikate eingerichtet sind:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
